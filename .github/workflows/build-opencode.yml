name: Build OpenCode Image

on:
  push:
    branches: [main]
    paths:
      - 'docker/opencode/**'
      - '.github/workflows/build-opencode.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docker/opencode/**'
  workflow_dispatch:
    inputs:
      opencode_version:
        description: 'OpenCode version (leave empty for latest)'
        required: false
        default: 'latest'
  schedule:
    - cron: '0 2 * * 0'  # 每周日凌晨2点

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/opencode-custom

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest OpenCode version
        id: opencode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 手动指定版本优先，否则自动从 GitHub Releases 抓取最新 tag
          if [ -n "${{ inputs.opencode_version }}" ]; then
            echo "tag=${{ inputs.opencode_version }}" >> "$GITHUB_OUTPUT"
            echo "Using manual version: ${{ inputs.opencode_version }}"
          else
            TAG=$(curl -sfL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              https://api.github.com/repos/anomalyco/opencode/releases/latest \
              | grep '"tag_name"' | head -1 | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')
            if [ -n "$TAG" ]; then
              echo "tag=$TAG" >> "$GITHUB_OUTPUT"
              echo "Detected latest version: $TAG"
            else
              echo "tag=latest" >> "$GITHUB_OUTPUT"
              echo "⚠ Failed to detect, using: latest"
            fi
          fi

      - name: Check if version already built
        id: check
        run: |
          TAG="opencode-${{ steps.opencode.outputs.tag }}"
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"

          # 仅在定时任务时执行去重检查；push/manual/PR 始终构建（Dockerfile 可能已变）
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "🔨 非定时触发，始终构建 (event: ${{ github.event_name }})"
            exit 0
          fi

          # latest 不是精确版本，定时任务也需要构建
          if [ "${{ steps.opencode.outputs.tag }}" = "latest" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "⚠ Version is 'latest', will rebuild"
            exit 0
          fi

          if docker manifest inspect "${IMG}" > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏭ ${IMG} 已存在，跳过构建"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "🔨 ${IMG} 不存在，开始构建"
          fi

      - name: Generate image metadata
        if: steps.check.outputs.skip != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=opencode-${{ steps.opencode.outputs.tag }}
            type=sha,prefix=,format=short
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=ref,event=pr

      - name: Build and push
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: docker/opencode
          file: docker/opencode/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            OPENCODE_VERSION=${{ steps.opencode.outputs.tag }}
            UID=1000
            GID=1000
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: always()
        run: |
          IMG="ghcr.io/${{ env.IMAGE_NAME }}"
          if [ "${{ steps.check.outputs.skip }}" = "true" ]; then
            echo "⏭ 跳过: ${IMG}:opencode-${{ steps.opencode.outputs.tag }} (已存在)"
          elif [ "${{ job.status }}" = "success" ]; then
            echo "✅ 成功: ${IMG}:opencode-${{ steps.opencode.outputs.tag }}"
            echo "   ${IMG}:latest"
          else
            echo "❌ 构建失败"
          fi
