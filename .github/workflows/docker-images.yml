name: Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/docker-images.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docker/**'
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}/selfhosted

jobs:
  discover:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          dirs=$(find docker -maxdepth 2 -name Dockerfile -exec dirname {} \; \
            | sed 's|docker/||' \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$dirs" >> "$GITHUB_OUTPUT"
          echo "discovered: $dirs"

  build:
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '[]' && needs.discover.outputs.matrix != '' }}
    strategy:
      matrix:
        dir: ${{ fromJSON(needs.discover.outputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.dir }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=,format=short
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/${{ matrix.dir }}
          file: docker/${{ matrix.dir }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "✅ ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.dir }}:${{ steps.meta.outputs.version }}"
