api_version: "1.0"
name: postgres
description: "PostgreSQL database server"
category: database
tags: [postgres, postgresql, database, sql]
dependencies: []

container:
  name: postgres
  image: postgres:15
  volumes:
    - "{{ .DataDir }}/postgres/15/data:/var/lib/postgresql/data:Z"
  environment:
    TZ: "{{ .Custom.TZ | default "Asia/Shanghai" }}"
    LANG: "C.UTF-8"
    LC_ALL: "C.UTF-8"
    POSTGRES_USER: root
    POSTGRES_PASSWORD: "{{ .Custom.POSTGRES_PASSWORD }}"
  networks:
    - "{{ .NetworkName }}"
  restart: always
  resources:
    memory: "512M"
