api_version: "1.0"
name: moviepilot
description: "MoviePilot media automation (PT helper)"
category: media
tags:
  - pt
  - automation
  - media
dependencies:
  - traefik

container:
  name: moviepilot
  image: jxxghp/moviepilot-v2:latest
  volumes:
    - "{{ .DataDir }}/moviepilot-v2/config:/config"
    - "{{ .DataDir }}/public/:/data"
    - "{{ .DataDir }}/moviepilot-v2/.cloakbrowser:/moviepilot/.cloakbrowser"
    - "/var/run/docker.sock:/var/run/docker.sock:ro"
  environment:
    TZ: "{{ .Custom.TZ | default \"Asia/Shanghai\" }}"
    LANG: "{{ .Custom.LANG | default \"zh_CN.UTF-8\" }}"
    PUID: "{{ .Custom.PUID | default \"1000\" }}"
    PGID: "{{ .Custom.PGID | default \"1000\" }}"
    UMASK: "022"
    LOG_LEVEL: "WARNING"
    DOH: "False"
    AUTH_SITE: "{{ .Custom.MOVIEPILOT_AUTH_SITE }}"
    IYUU_SIGN: "{{ .Custom.IYUU_SIGN }}"
    HHCLUB_USERNAME: "{{ .Custom.HHCLUB_USERNAME }}"
    HHCLUB_PASSKEY: "{{ .Custom.HHCLUB_PASSKEY }}"
    AUDIENCES_UID: "{{ .Custom.AUDIENCES_UID }}"
    AUDIENCES_PASSKEY: "{{ .Custom.AUDIENCES_PASSKEY }}"
    HDDOLBY_ID: "{{ .Custom.HDDOLBY_ID }}"
    HDDOLBY_PASSKEY: "{{ .Custom.HDDOLBY_PASSKEY }}"
    ZMPT_UID: "{{ .Custom.ZMPT_UID }}"
    ZMPT_PASSKEY: "{{ .Custom.ZMPT_PASSKEY }}"
    FREEFARM_UID: "{{ .Custom.FREEFARM_UID }}"
    FREEFARM_PASSKEY: "{{ .Custom.FREEFARM_PASSKEY }}"
    HDFANS_UID: "{{ .Custom.HDFANS_UID }}"
    HDFANS_PASSKEY: "{{ .Custom.HDFANS_PASSKEY }}"
    WINTERSAKURA_UID: "{{ .Custom.WINTERSAKURA_UID }}"
    WINTERSAKURA_PASSKEY: "{{ .Custom.WINTERSAKURA_PASSKEY }}"
    LEAVES_UID: "{{ .Custom.LEAVES_UID }}"
    LEAVES_PASSKEY: "{{ .Custom.LEAVES_PASSKEY }}"
    PTBA_UID: "{{ .Custom.PTBA_UID }}"
    PTBA_PASSKEY: "{{ .Custom.PTBA_PASSKEY }}"
    ICC2022_UID: "{{ .Custom.ICC2022_UID }}"
    ICC2022_PASSKEY: "{{ .Custom.ICC2022_PASSKEY }}"
    XINGTAN_UID: "{{ .Custom.XINGTAN_UID }}"
    XINGTAN_PASSKEY: "{{ .Custom.XINGTAN_PASSKEY }}"
    PTVICOMO_UID: "{{ .Custom.PTVICOMO_UID }}"
    PTVICOMO_PASSKEY: "{{ .Custom.PTVICOMO_PASSKEY }}"
    AGSVPT_UID: "{{ .Custom.AGSVPT_UID }}"
    AGSVPT_PASSKEY: "{{ .Custom.AGSVPT_PASSKEY }}"
    HDKYL_UID: "{{ .Custom.HDKYL_UID }}"
    HDKYL_PASSKEY: "{{ .Custom.HDKYL_PASSKEY }}"
    QINGWA_UID: "{{ .Custom.QINGWA_UID }}"
    QINGWA_PASSKEY: "{{ .Custom.QINGWA_PASSKEY }}"
    DISCFAN_UID: "{{ .Custom.DISCFAN_UID }}"
    DISCFAN_PASSKEY: "{{ .Custom.DISCFAN_PASSKEY }}"
    HAIDAN_ID: "{{ .Custom.HAIDAN_ID }}"
    HAIDAN_PASSKEY: "{{ .Custom.HAIDAN_PASSKEY }}"
    ROUSI_UID: "{{ .Custom.ROUSI_UID }}"
    ROUSI_PASSKEY: "{{ .Custom.ROUSI_PASSKEY }}"
    SUNNY_UID: "{{ .Custom.SUNNY_UID }}"
    SUNNY_PASSKEY: "{{ .Custom.SUNNY_PASSKEY }}"
    PTCAFE_UID: "{{ .Custom.PTCAFE_UID }}"
    PTCAFE_PASSKEY: "{{ .Custom.PTCAFE_PASSKEY }}"
    PTZONE_UID: "{{ .Custom.PTZONE_UID }}"
    PTZONE_PASSKEY: "{{ .Custom.PTZONE_PASSKEY }}"
    KUFEI_UID: "{{ .Custom.KUFEI_UID }}"
    KUFEI_PASSKEY: "{{ .Custom.KUFEI_PASSKEY }}"
    YEMAPT_UID: "{{ .Custom.YEMAPT_UID }}"
    YEMAPT_PASSKEY: "{{ .Custom.YEMAPT_PASSKEY }}"
    HSPT_UID: "{{ .Custom.HSPT_UID }}"
    HSPT_PASSKEY: "{{ .Custom.HSPT_PASSKEY }}"
    XINGYUNGE_UID: "{{ .Custom.XINGYUNGE_UID }}"
    XINGYUNGE_PASSKEY: "{{ .Custom.XINGYUNGE_PASSKEY }}"
    CSPT_UID: "{{ .Custom.CSPT_UID }}"
    CSPT_PASSKEY: "{{ .Custom.CSPT_PASSKEY }}"
    TMPT_UID: "{{ .Custom.TMPT_UID }}"
    TMPT_PASSKEY: "{{ .Custom.TMPT_PASSKEY }}"
    RAINGFH_UID: "{{ .Custom.RAINGFH_UID }}"
    RAINGFH_PASSKEY: "{{ .Custom.RAINGFH_PASSKEY }}"
    GTKPW_UID: "{{ .Custom.GTKPW_UID }}"
    GTKPW_PASSKEY: "{{ .Custom.GTKPW_PASSKEY }}"
    PTLGS_UID: "{{ .Custom.PTLGS_UID }}"
    PTLGS_PASSKEY: "{{ .Custom.PTLGS_PASSKEY }}"
    HDBAO_UID: "{{ .Custom.HDBAO_UID }}"
    HDBAO_PASSKEY: "{{ .Custom.HDBAO_PASSKEY }}"
    SEWERPT_UID: "{{ .Custom.SEWERPT_UID }}"
    SEWERPT_PASSKEY: "{{ .Custom.SEWERPT_PASSKEY }}"
    GITHUB_TOKEN: "{{ .Custom.GITHUB_READ_ACCESS_TOKEN }}"
    DB_TYPE: "{{ .Custom.MP_DB_TYPE | default \"sqlite\" }}"
    DB_SQLITE_WAL_ENABLE: "{{ .Custom.MP_DB_WAL_ENABLE | default \"false\" }}"
  labels:
    traefik.enable: "true"
    traefik.http.middlewares.moviepilot.compress: "true"
    traefik.http.routers.moviepilot.rule: "Host(`moviepilot.{{ .Domain }}`)"
    traefik.http.routers.moviepilot.tls: "{{ .TLSEnabled }}"
    traefik.http.routers.moviepilot.tls.certresolver: "traefik"
    traefik.http.routers.moviepilot.tls.domains[0].main: "moviepilot.{{ .Domain }}"
    traefik.http.services.moviepilot.loadbalancer.server.port: "3000"
  networks:
    - "{{ .NetworkName }}"
  restart: unless-stopped
  privileged: false

  resources:
    memory: "512M"

traefik:
  enabled: true
  entrypoint: websecure
  host: "moviepilot.{{ .Domain }}"
  tls: true
  cert_resolver: traefik
  network_mode: bridge

post_install:
  message: |
    MoviePilot installed successfully!
    URL: https://moviepilot.{{ .Domain }}
    Set auth site credentials and database config via custom variables.
    Supported auth sites: iyuu, hhclub, audiences, hddolby, zmpt, freefarm, hdfans, wintersakura, leaves, ptba, icc2022, xingtan, ptvicomo, agsvpt, hdkyl, qingwa, discfan, haidan, rousi, sunny, ptcafe, ptzone, kufei, yemapt, hspt, xingyunge, cspt, tmpt, raingfh, gtkpw, ptlgs, hdbao, sewerpt, custom
