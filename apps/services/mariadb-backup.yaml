api_version: "1.0"
name: mariadb-backup
description: "Automated MariaDB/MySQL database backup service"
category: database
tags: [mariadb, mysql, backup, database]
dependencies: [mariadb]

container:
  name: mariadb-backup
  image: databack/mysql-backup
  user: "{{ index .Custom "PUID" | default \"1000\" }}:{{ index .Custom "PGID" | default \"1000\" }}"
  command:
    - dump
  volumes:
    - "{{ .DataDir }}/mariadb-backup/backup:/db"
  environment:
    TZ: "{{ index .Custom "TZ" | default \"Asia/Shanghai\" }}"
    LANG: "zh_CN.UTF-8"
    DB_SERVER: "{{ index .Custom "MYSQL_HOST" | default \"mariadb\" }}"
    DB_USER: root
    DB_PASS: "{{ index .Custom "MYSQL_PASSWORD" }}"
    DB_DUMP_FREQUENCY: "60"
    DB_DUMP_BEGIN: "0000"
    DB_DUMP_TARGET: /db
  networks:
    - "{{ .NetworkName }}"
  restart: always
  resources:
    memory: "64M"
