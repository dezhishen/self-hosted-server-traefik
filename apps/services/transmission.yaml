api_version: "1.0"
name: transmission
description: "Transmission torrent client"
category: media
tags:
  - torrent
  - download
dependencies:
  - traefik

params:
  - name: "self.TRANSMISSION_USER"
    type: string
    label: "Transmission User"
    default: "admin"
  - name: "self.TRANSMISSION_PASSWORD"
    type: password
    label: "Transmission Password"
    secret: true

container:
  name: transmission
  image: linuxserver/transmission
  volumes:
    - "{{ .DataDir }}/transmission/config:/config"
    - "{{ .DataDir }}/public/downloads:/data/downloads"
    - "{{ .DataDir }}/transmission/finished-torrents:/finished-torrents"
  environment:
    TZ: "{{ index .Custom "common.TZ" | default \"Asia/Shanghai\" }}"
    LANG: "{{ index .Custom "common.LANG" | default \"zh_CN.UTF-8\" }}"
    PUID: "{{ index .Custom "common.PUID" | default \"1000\" }}"
    PGID: "{{ index .Custom "common.PGID" | default \"1000\" }}"
    USER: "{{ index .Custom "self.TRANSMISSION_USER" | default \"admin\" }}"
    PASS: "{{ index .Custom "self.TRANSMISSION_PASSWORD" }}"
  networks:
    - "{{ .NetworkName }}"
  restart: unless-stopped
  privileged: false
  network_mode: ""

  resources:
    memory: "512M"

traefik:
  enabled: true
  entrypoint: websecure
  host: "transmission.{{ .Domain }}"
  tls: true
  cert_resolver: traefik
  network_mode: bridge

post_install:
  message: |
    Transmission installed successfully!
    URL: https://transmission.{{ .Domain }}
    Note: This service supports macvlan mode for VPN/isolation (configure separately).
    Incomplete torrents directory can be customized via INCOMPLETE_TORRENTS_DIR custom variable.
