api_version: "1.0"
name: immich-server
description: "Immich server for photo and video management"
category: media
tags: [immich, photos, videos, management]
dependencies: [immich-database]

container:
  name: immich-server
  image: "ghcr.nju.edu.cn/immich-app/immich-server:{{ .Custom.IMMICH_VERSION | default \"latest\" }}"
  user: "{{ .Custom.PUID | default \"1000\" }}:{{ .Custom.PGID | default \"1000\" }}"
  group_add:
    - "{{ .Custom.VIDEO_GID | default \"44\" }}"
    - "{{ .Custom.RENDER_GID | default \"104\" }}"
  devices:
    - "/dev/dri:/dev/dri"
  volumes:
    - "{{ .DataDir }}/public/photos/library:/data/library"
    - "{{ .DataDir }}/immich/data/encoded-video:/data/encoded-video"
    - "{{ .DataDir }}/immich/data/thumbs:/data/thumbs"
    - "{{ .DataDir }}/immich/data/upload:/data/upload"
    - "{{ .DataDir }}/immich/data/profile:/data/profile"
    - "{{ .DataDir }}/immich/data/backups:/data/backups"
  environment:
    TZ: "{{ .Custom.TZ | default \"Asia/Shanghai\" }}"
    LANG: "C.UTF-8"
    DB_HOSTNAME: immich-database
    DB_USERNAME: postgres
    DB_PASSWORD: "{{ .Custom.IMMICH_DATA_PASSWORD }}"
    DB_DATABASE_NAME: immich
    DB_PORT: "5432"
    REDIS_HOSTNAME: "{{ .Custom.REDIS_HOST | default \"redis\" }}"
    REDIS_PORT: "{{ .Custom.REDIS_PORT | default \"6379\" }}"
    REDIS_PASSWORD: "{{ .Custom.REDIS_PASSWORD }}"
    REDIS_DBINDEX: "{{ .Custom.IMMICH_REDIS_DBINDEX | default \"0\" }}"
  networks:
    - "{{ .NetworkName }}"
  restart: always

traefik:
  enabled: true
  entrypoint: websecure
  host: "immich.{{ .Domain }}"
  tls: "{{ .TLSEnabled }}"
  cert_resolver: traefik
  network_mode: bridge
