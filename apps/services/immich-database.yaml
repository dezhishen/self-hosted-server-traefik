api_version: "1.0"
name: immich-database
description: "Immich PostgreSQL database for storing metadata"
category: database
tags: [immich, photos, management]
dependencies: []

container:
  name: immich-database
  image: ghcr.nju.edu.cn/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
  user: "{{ .Custom.PUID | default \"1000\" }}:{{ .Custom.PGID | default \"1000\" }}"
  volumes:
    - "{{ .DataDir }}/immich/database:/var/lib/postgresql/data"
  environment:
    TZ: "{{ .Custom.TZ | default \"Asia/Shanghai\" }}"
    LANG: "C.UTF-8"
    POSTGRES_PASSWORD: "{{ .Custom.IMMICH_DATA_PASSWORD }}"
    POSTGRES_USER: postgres
    POSTGRES_DB: immich
  networks:
    - "{{ .NetworkName }}"
  restart: always
  resources:
    memory: "256M"
