api_version: "1.0"
name: beszel
description: "Beszel lightweight server monitoring hub"
category: monitoring
tags: [monitoring, metrics, dashboard]
dependencies: []

container:
  name: beszel
  image: henrygd/beszel
  volumes:
    - "{{ .DataDir }}/beszel/data:/beszel_data"
  environment:
    TZ: "{{ index .Custom "common.TZ" | default \"Asia/Shanghai\" }}"
    LANG: "zh_CN.UTF-8"
    PUID: "{{ index .Custom "common.PUID" | default \"1000\" }}"
    PGID: "{{ index .Custom "common.PGID" | default \"1000\" }}"
  networks:
    - "{{ .NetworkName }}"
  restart: always
  resources:
    memory: "64M"

traefik:
  enabled: true
  entrypoint: websecure
  host: "beszel.{{ .Domain }}"
  tls: "{{ .TLSEnabled }}"
  cert_resolver: traefik
  network_mode: bridge
