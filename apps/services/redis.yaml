api_version: "1.0"
name: redis
description: "Redis key-value store (Valkey)"
category: database
tags: [redis, valkey, cache, key-value]
dependencies: []

params:
  - name: "app.REDIS_PASSWORD"
    type: password
    label: "Redis Password"
    secret: true

container:
  name: redis
  image: valkey/valkey
  user: "{{ index .Custom "common.PUID" | default \"1000\" }}:{{ index .Custom "common.PGID" | default \"1000\" }}"
  command:
    - "--requirepass"
    - "{{ index .Custom "app.REDIS_PASSWORD" }}"
  volumes:
    - "{{ .DataDir }}/redis/data:/data"
  networks:
    - "{{ .NetworkName }}"
  restart: always
  resources:
    memory: "512M"
