api_version: "1.0"
name: redis
description: "Redis key-value store (Valkey)"
category: database
tags: [redis, valkey, cache, key-value]
dependencies: []

container:
  name: redis
  image: valkey/valkey
  user: "{{ index .Custom "PUID" | default \"1000\" }}:{{ index .Custom "PGID" | default \"1000\" }}"
  command:
    - "--requirepass"
    - "{{ index .Custom "REDIS_PASSWORD" }}"
  volumes:
    - "{{ .DataDir }}/redis/data:/data"
  networks:
    - "{{ .NetworkName }}"
  restart: always
  resources:
    memory: "512M"
