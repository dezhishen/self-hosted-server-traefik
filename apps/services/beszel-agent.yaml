api_version: "1.0"
name: beszel-agent
description: "Beszel monitoring agent for remote servers"
category: monitoring
tags: [monitoring, metrics, agent]
dependencies: [beszel]

container:
  name: beszel-agent
  image: henrygd/beszel-agent
  volumes:
    - "/var/run/docker.sock:/var/run/docker.sock:ro"
  environment:
    TZ: "{{ index .Custom "TZ" | default \"Asia/Shanghai\" }}"
    LANG: "zh_CN.UTF-8"
    PORT: "45876"
    KEY: "{{ index .Custom "BESZEL_PUBLIC_KEY" }}"
    HUB_URL: "{{ index .Custom "BESZEL_HUB_URL" | default \"http://beszel:8090\" }}"
    TOKEN: "{{ index .Custom "BESZEL_TOKEN" }}"
  networks:
    - "{{ .NetworkName }}"
  restart: always
  resources:
    memory: "64M"
