api_version: "1.0"
name: natfrpc
description: "SakuraFrp (NatFrp) client for NAT traversal"
category: network
tags: [nat, tunnel, frp, proxy]
dependencies: []

params:
  - name: "self.NATFRPC_TOKEN"
    type: password
    label: "Natfrpc Token"
    secret: true
  - name: "self.NATFRPC_TUNNELS"
    type: string
    label: "Natfrpc Tunnels"

container:
  name: natfrpc
  image: ghcr.io/natfrp/frpc:latest
  command:
    - "-f"
    - "{{ index .Custom "self.NATFRPC_TOKEN" }}:{{ index .Custom "self.NATFRPC_TUNNELS" }}"
  environment:
    TZ: "{{ index .Custom "common.TZ" | default \"Asia/Shanghai\" }}"
  networks:
    - "{{ .NetworkName }}"
  restart: always
  resources:
    memory: "64M"
