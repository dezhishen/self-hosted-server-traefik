api_version: "1.0"
name: root
description: "Root - nginx-based root site with digest authentication"
category: utility
tags:
  - nginx
  - web
  - landing
dependencies:
  - traefik

params:
  - name: "self.ROOT_AUTH_USER"
    type: string
    label: "Root Auth User"
    default: "admin"
  - name: "self.ROOT_AUTH_DIGEST"
    type: password
    label: "Root Auth Digest"
    secret: true

container:
  name: root
  ports: []
  volumes:
    - "{{ .DataDir }}/root/data:/usr/share/nginx/html"
    - "{{ .DataDir }}/root/conf.d:/etc/nginx/conf.d"
  environment:
    USER_UID: "{{ index .Custom "common.PUID" | default \"1000\" }}"
    USER_GID: "{{ index .Custom "common.PGID" | default \"1000\" }}"
    TZ: "Asia/Shanghai"
    LANG: "zh_CN.UTF-8"
  labels:
    traefik.enable: "true"
    traefik.http.routers.root.entrypoints: "websecure"
    traefik.http.routers.root.rule: "Host(`root.{{ .Domain }}`)"
    traefik.http.routers.root.tls.certresolver: "traefik"
    traefik.http.middlewares.root-auth.digestauth.users: "{{ index .Custom "self.ROOT_AUTH_USER" | default \"admin\" }}:traefik:{{ index .Custom "self.ROOT_AUTH_DIGEST" }}"
    traefik.http.routers.root.middlewares: "root-auth@docker"
  networks:
    - "{{ .NetworkName }}"
  restart: always
  privileged: false
  resources:
    memory: "128M"

traefik:
  enabled: true
  entrypoint: websecure
  host: "root.{{ .Domain }}"
  tls: true
  cert_resolver: traefik
  auth: true

post_install:
  message: |
    Root site installed successfully!
    URL: https://root.{{ .Domain }}
    Set ROOT_AUTH_USER and ROOT_AUTH_PASSWORD custom variables for authentication.
