api_version: "1.0"
name: moviepilot
description: "MoviePilot media automation (PT helper)"
category: media
tags:
  - pt
  - automation
  - media
dependencies:
  - traefik

container:
  name: moviepilot
  image: jxxghp/moviepilot-v2:latest
  volumes:
    - "{{ .DataDir }}/moviepilot-v2/config:/config"
    - "{{ .DataDir }}/public/:/data"
    - "{{ .DataDir }}/moviepilot-v2/.cloakbrowser:/moviepilot/.cloakbrowser"
    - "/var/run/docker.sock:/var/run/docker.sock:ro"
  environment:
    TZ: "{{ index .Custom "TZ" | default \"Asia/Shanghai\" }}"
    LANG: "{{ index .Custom "LANG" | default \"zh_CN.UTF-8\" }}"
    PUID: "{{ index .Custom "PUID" | default \"1000\" }}"
    PGID: "{{ index .Custom "PGID" | default \"1000\" }}"
    UMASK: "022"
    LOG_LEVEL: "WARNING"
    DOH: "False"
    AUTH_SITE: "{{ index .Custom "MOVIEPILOT_AUTH_SITE" }}"
    IYUU_SIGN: "{{ index .Custom "IYUU_SIGN" }}"
    HHCLUB_USERNAME: "{{ index .Custom "HHCLUB_USERNAME" }}"
    HHCLUB_PASSKEY: "{{ index .Custom "HHCLUB_PASSKEY" }}"
    AUDIENCES_UID: "{{ index .Custom "AUDIENCES_UID" }}"
    AUDIENCES_PASSKEY: "{{ index .Custom "AUDIENCES_PASSKEY" }}"
    HDDOLBY_ID: "{{ index .Custom "HDDOLBY_ID" }}"
    HDDOLBY_PASSKEY: "{{ index .Custom "HDDOLBY_PASSKEY" }}"
    ZMPT_UID: "{{ index .Custom "ZMPT_UID" }}"
    ZMPT_PASSKEY: "{{ index .Custom "ZMPT_PASSKEY" }}"
    FREEFARM_UID: "{{ index .Custom "FREEFARM_UID" }}"
    FREEFARM_PASSKEY: "{{ index .Custom "FREEFARM_PASSKEY" }}"
    HDFANS_UID: "{{ index .Custom "HDFANS_UID" }}"
    HDFANS_PASSKEY: "{{ index .Custom "HDFANS_PASSKEY" }}"
    WINTERSAKURA_UID: "{{ index .Custom "WINTERSAKURA_UID" }}"
    WINTERSAKURA_PASSKEY: "{{ index .Custom "WINTERSAKURA_PASSKEY" }}"
    LEAVES_UID: "{{ index .Custom "LEAVES_UID" }}"
    LEAVES_PASSKEY: "{{ index .Custom "LEAVES_PASSKEY" }}"
    PTBA_UID: "{{ index .Custom "PTBA_UID" }}"
    PTBA_PASSKEY: "{{ index .Custom "PTBA_PASSKEY" }}"
    ICC2022_UID: "{{ index .Custom "ICC2022_UID" }}"
    ICC2022_PASSKEY: "{{ index .Custom "ICC2022_PASSKEY" }}"
    XINGTAN_UID: "{{ index .Custom "XINGTAN_UID" }}"
    XINGTAN_PASSKEY: "{{ index .Custom "XINGTAN_PASSKEY" }}"
    PTVICOMO_UID: "{{ index .Custom "PTVICOMO_UID" }}"
    PTVICOMO_PASSKEY: "{{ index .Custom "PTVICOMO_PASSKEY" }}"
    AGSVPT_UID: "{{ index .Custom "AGSVPT_UID" }}"
    AGSVPT_PASSKEY: "{{ index .Custom "AGSVPT_PASSKEY" }}"
    HDKYL_UID: "{{ index .Custom "HDKYL_UID" }}"
    HDKYL_PASSKEY: "{{ index .Custom "HDKYL_PASSKEY" }}"
    QINGWA_UID: "{{ index .Custom "QINGWA_UID" }}"
    QINGWA_PASSKEY: "{{ index .Custom "QINGWA_PASSKEY" }}"
    DISCFAN_UID: "{{ index .Custom "DISCFAN_UID" }}"
    DISCFAN_PASSKEY: "{{ index .Custom "DISCFAN_PASSKEY" }}"
    HAIDAN_ID: "{{ index .Custom "HAIDAN_ID" }}"
    HAIDAN_PASSKEY: "{{ index .Custom "HAIDAN_PASSKEY" }}"
    ROUSI_UID: "{{ index .Custom "ROUSI_UID" }}"
    ROUSI_PASSKEY: "{{ index .Custom "ROUSI_PASSKEY" }}"
    SUNNY_UID: "{{ index .Custom "SUNNY_UID" }}"
    SUNNY_PASSKEY: "{{ index .Custom "SUNNY_PASSKEY" }}"
    PTCAFE_UID: "{{ index .Custom "PTCAFE_UID" }}"
    PTCAFE_PASSKEY: "{{ index .Custom "PTCAFE_PASSKEY" }}"
    PTZONE_UID: "{{ index .Custom "PTZONE_UID" }}"
    PTZONE_PASSKEY: "{{ index .Custom "PTZONE_PASSKEY" }}"
    KUFEI_UID: "{{ index .Custom "KUFEI_UID" }}"
    KUFEI_PASSKEY: "{{ index .Custom "KUFEI_PASSKEY" }}"
    YEMAPT_UID: "{{ index .Custom "YEMAPT_UID" }}"
    YEMAPT_PASSKEY: "{{ index .Custom "YEMAPT_PASSKEY" }}"
    HSPT_UID: "{{ index .Custom "HSPT_UID" }}"
    HSPT_PASSKEY: "{{ index .Custom "HSPT_PASSKEY" }}"
    XINGYUNGE_UID: "{{ index .Custom "XINGYUNGE_UID" }}"
    XINGYUNGE_PASSKEY: "{{ index .Custom "XINGYUNGE_PASSKEY" }}"
    CSPT_UID: "{{ index .Custom "CSPT_UID" }}"
    CSPT_PASSKEY: "{{ index .Custom "CSPT_PASSKEY" }}"
    TMPT_UID: "{{ index .Custom "TMPT_UID" }}"
    TMPT_PASSKEY: "{{ index .Custom "TMPT_PASSKEY" }}"
    RAINGFH_UID: "{{ index .Custom "RAINGFH_UID" }}"
    RAINGFH_PASSKEY: "{{ index .Custom "RAINGFH_PASSKEY" }}"
    GTKPW_UID: "{{ index .Custom "GTKPW_UID" }}"
    GTKPW_PASSKEY: "{{ index .Custom "GTKPW_PASSKEY" }}"
    PTLGS_UID: "{{ index .Custom "PTLGS_UID" }}"
    PTLGS_PASSKEY: "{{ index .Custom "PTLGS_PASSKEY" }}"
    HDBAO_UID: "{{ index .Custom "HDBAO_UID" }}"
    HDBAO_PASSKEY: "{{ index .Custom "HDBAO_PASSKEY" }}"
    SEWERPT_UID: "{{ index .Custom "SEWERPT_UID" }}"
    SEWERPT_PASSKEY: "{{ index .Custom "SEWERPT_PASSKEY" }}"
    GITHUB_TOKEN: "{{ index .Custom "GITHUB_READ_ACCESS_TOKEN" }}"
    DB_TYPE: "{{ index .Custom "MP_DB_TYPE" | default \"sqlite\" }}"
    DB_SQLITE_WAL_ENABLE: "{{ index .Custom "MP_DB_WAL_ENABLE" | default \"false\" }}"
  labels:
    traefik.enable: "true"
    traefik.http.middlewares.moviepilot.compress: "true"
    traefik.http.routers.moviepilot.rule: "Host(`moviepilot.{{ .Domain }}`)"
    traefik.http.routers.moviepilot.tls: "{{ .TLSEnabled }}"
    traefik.http.routers.moviepilot.tls.certresolver: "traefik"
    traefik.http.routers.moviepilot.tls.domains[0].main: "moviepilot.{{ .Domain }}"
    traefik.http.services.moviepilot.loadbalancer.server.port: "3000"
  networks:
    - "{{ .NetworkName }}"
  restart: unless-stopped
  privileged: false

  resources:
    memory: "512M"

traefik:
  enabled: true
  entrypoint: websecure
  host: "moviepilot.{{ .Domain }}"
  tls: true
  cert_resolver: traefik
  network_mode: bridge

post_install:
  message: |
    MoviePilot installed successfully!
    URL: https://moviepilot.{{ .Domain }}
    Set auth site credentials and database config via custom variables.
    Supported auth sites: iyuu, hhclub, audiences, hddolby, zmpt, freefarm, hdfans, wintersakura, leaves, ptba, icc2022, xingtan, ptvicomo, agsvpt, hdkyl, qingwa, discfan, haidan, rousi, sunny, ptcafe, ptzone, kufei, yemapt, hspt, xingyunge, cspt, tmpt, raingfh, gtkpw, ptlgs, hdbao, sewerpt, custom
