container:
  name: moviepilot
  image: jxxghp/moviepilot-v2:latest
  volumes:
    - "{{ .DataDir }}/moviepilot-v2/config:/config"
    - "{{ .DataDir }}/public/:/data"
    - "{{ .DataDir }}/moviepilot-v2/.cloakbrowser:/moviepilot/.cloakbrowser"
    - "/var/run/docker.sock:/var/run/docker.sock:ro"
  environment:
    TZ: "{{ index .Custom "common.TZ" | default \"Asia/Shanghai\" }}"
    LANG: "{{ index .Custom "common.LANG" | default \"zh_CN.UTF-8\" }}"
    PUID: "{{ index .Custom "common.PUID" | default \"1000\" }}"
    PGID: "{{ index .Custom "common.PGID" | default \"1000\" }}"
    UMASK: "022"
    LOG_LEVEL: "WARNING"
    DOH: "False"
    AUTH_SITE: "{{ index .Custom "self.MOVIEPILOT_AUTH_SITE" }}"
    IYUU_SIGN: "{{ index .Custom "self.IYUU_SIGN" }}"
    HHCLUB_USERNAME: "{{ index .Custom "self.HHCLUB_USERNAME" }}"
    HHCLUB_PASSKEY: "{{ index .Custom "self.HHCLUB_PASSKEY" }}"
    AUDIENCES_UID: "{{ index .Custom "self.AUDIENCES_UID" }}"
    AUDIENCES_PASSKEY: "{{ index .Custom "self.AUDIENCES_PASSKEY" }}"
    HDDOLBY_ID: "{{ index .Custom "self.HDDOLBY_ID" }}"
    HDDOLBY_PASSKEY: "{{ index .Custom "self.HDDOLBY_PASSKEY" }}"
    ZMPT_UID: "{{ index .Custom "self.ZMPT_UID" }}"
    ZMPT_PASSKEY: "{{ index .Custom "self.ZMPT_PASSKEY" }}"
    FREEFARM_UID: "{{ index .Custom "self.FREEFARM_UID" }}"
    FREEFARM_PASSKEY: "{{ index .Custom "self.FREEFARM_PASSKEY" }}"
    HDFANS_UID: "{{ index .Custom "self.HDFANS_UID" }}"
    HDFANS_PASSKEY: "{{ index .Custom "self.HDFANS_PASSKEY" }}"
    WINTERSAKURA_UID: "{{ index .Custom "self.WINTERSAKURA_UID" }}"
    WINTERSAKURA_PASSKEY: "{{ index .Custom "self.WINTERSAKURA_PASSKEY" }}"
    LEAVES_UID: "{{ index .Custom "self.LEAVES_UID" }}"
    LEAVES_PASSKEY: "{{ index .Custom "self.LEAVES_PASSKEY" }}"
    PTBA_UID: "{{ index .Custom "self.PTBA_UID" }}"
    PTBA_PASSKEY: "{{ index .Custom "self.PTBA_PASSKEY" }}"
    ICC2022_UID: "{{ index .Custom "self.ICC2022_UID" }}"
    ICC2022_PASSKEY: "{{ index .Custom "self.ICC2022_PASSKEY" }}"
    XINGTAN_UID: "{{ index .Custom "self.XINGTAN_UID" }}"
    XINGTAN_PASSKEY: "{{ index .Custom "self.XINGTAN_PASSKEY" }}"
    PTVICOMO_UID: "{{ index .Custom "self.PTVICOMO_UID" }}"
    PTVICOMO_PASSKEY: "{{ index .Custom "self.PTVICOMO_PASSKEY" }}"
    AGSVPT_UID: "{{ index .Custom "self.AGSVPT_UID" }}"
    AGSVPT_PASSKEY: "{{ index .Custom "self.AGSVPT_PASSKEY" }}"
    HDKYL_UID: "{{ index .Custom "self.HDKYL_UID" }}"
    HDKYL_PASSKEY: "{{ index .Custom "self.HDKYL_PASSKEY" }}"
    QINGWA_UID: "{{ index .Custom "self.QINGWA_UID" }}"
    QINGWA_PASSKEY: "{{ index .Custom "self.QINGWA_PASSKEY" }}"
    DISCFAN_UID: "{{ index .Custom "self.DISCFAN_UID" }}"
    DISCFAN_PASSKEY: "{{ index .Custom "self.DISCFAN_PASSKEY" }}"
    HAIDAN_ID: "{{ index .Custom "self.HAIDAN_ID" }}"
    HAIDAN_PASSKEY: "{{ index .Custom "self.HAIDAN_PASSKEY" }}"
    ROUSI_UID: "{{ index .Custom "self.ROUSI_UID" }}"
    ROUSI_PASSKEY: "{{ index .Custom "self.ROUSI_PASSKEY" }}"
    SUNNY_UID: "{{ index .Custom "self.SUNNY_UID" }}"
    SUNNY_PASSKEY: "{{ index .Custom "self.SUNNY_PASSKEY" }}"
    PTCAFE_UID: "{{ index .Custom "self.PTCAFE_UID" }}"
    PTCAFE_PASSKEY: "{{ index .Custom "self.PTCAFE_PASSKEY" }}"
    PTZONE_UID: "{{ index .Custom "self.PTZONE_UID" }}"
    PTZONE_PASSKEY: "{{ index .Custom "self.PTZONE_PASSKEY" }}"
    KUFEI_UID: "{{ index .Custom "self.KUFEI_UID" }}"
    KUFEI_PASSKEY: "{{ index .Custom "self.KUFEI_PASSKEY" }}"
    YEMAPT_UID: "{{ index .Custom "self.YEMAPT_UID" }}"
    YEMAPT_PASSKEY: "{{ index .Custom "self.YEMAPT_PASSKEY" }}"
    HSPT_UID: "{{ index .Custom "self.HSPT_UID" }}"
    HSPT_PASSKEY: "{{ index .Custom "self.HSPT_PASSKEY" }}"
    XINGYUNGE_UID: "{{ index .Custom "self.XINGYUNGE_UID" }}"
    XINGYUNGE_PASSKEY: "{{ index .Custom "self.XINGYUNGE_PASSKEY" }}"
    CSPT_UID: "{{ index .Custom "self.CSPT_UID" }}"
    CSPT_PASSKEY: "{{ index .Custom "self.CSPT_PASSKEY" }}"
    TMPT_UID: "{{ index .Custom "self.TMPT_UID" }}"
    TMPT_PASSKEY: "{{ index .Custom "self.TMPT_PASSKEY" }}"
    RAINGFH_UID: "{{ index .Custom "self.RAINGFH_UID" }}"
    RAINGFH_PASSKEY: "{{ index .Custom "self.RAINGFH_PASSKEY" }}"
    GTKPW_UID: "{{ index .Custom "self.GTKPW_UID" }}"
    GTKPW_PASSKEY: "{{ index .Custom "self.GTKPW_PASSKEY" }}"
    PTLGS_UID: "{{ index .Custom "self.PTLGS_UID" }}"
    PTLGS_PASSKEY: "{{ index .Custom "self.PTLGS_PASSKEY" }}"
    HDBAO_UID: "{{ index .Custom "self.HDBAO_UID" }}"
    HDBAO_PASSKEY: "{{ index .Custom "self.HDBAO_PASSKEY" }}"
    SEWERPT_UID: "{{ index .Custom "self.SEWERPT_UID" }}"
    SEWERPT_PASSKEY: "{{ index .Custom "self.SEWERPT_PASSKEY" }}"
    GITHUB_TOKEN: "{{ index .Custom "self.GITHUB_READ_ACCESS_TOKEN" }}"
    DB_TYPE: "{{ index .Custom "self.MP_DB_TYPE" | default \"sqlite\" }}"
    DB_SQLITE_WAL_ENABLE: "{{ index .Custom "self.MP_DB_WAL_ENABLE" | default \"false\" }}"
  labels:
    traefik.enable: "true"
    traefik.http.middlewares.moviepilot.compress: "true"
    traefik.http.routers.moviepilot.rule: "Host(`moviepilot.{{ .Domain }}`)"
    traefik.http.routers.moviepilot.tls: "{{ .TLSEnabled }}"
    traefik.http.routers.moviepilot.tls.certresolver: "traefik"
    traefik.http.routers.moviepilot.tls.domains[0].main: "moviepilot.{{ .Domain }}"
    traefik.http.services.moviepilot.loadbalancer.server.port: "3000"
  networks:
    - "{{ .NetworkName }}"
  restart: unless-stopped
  privileged: false

  resources:
    memory: "512M"

traefik:
  enabled: true
  entrypoint: websecure
  host: "moviepilot.{{ .Domain }}"
  tls: true
  cert_resolver: traefik
  network_mode: bridge

post_install:
  message: |
    MoviePilot installed successfully!
    URL: https://moviepilot.{{ .Domain }}
    Set auth site credentials and database config via custom variables.
    Supported auth sites: iyuu, hhclub, audiences, hddolby, zmpt, freefarm, hdfans, wintersakura, leaves, ptba, icc2022, xingtan, ptvicomo, agsvpt, hdkyl, qingwa, discfan, haidan, rousi, sunny, ptcafe, ptzone, kufei, yemapt, hspt, xingyunge, cspt, tmpt, raingfh, gtkpw, ptlgs, hdbao, sewerpt, custom
