api_version: "1.0"
name: new-api
description: "New API - unified API gateway for LLM providers"
category: ai
tags:
  - api
  - llm
  - proxy
  - ai
dependencies:
  - traefik

container:
  name: new-api
  ports: []
  volumes:
    - "{{ .DataDir }}/new-api/data:/data"
  environment:
    TZ: "Asia/Shanghai"
    LANG: "zh_CN.UTF-8"
  labels:
    traefik.enable: "true"
    traefik.http.routers.new-api.entrypoints: "websecure"
    traefik.http.routers.new-api.rule: "Host(`new-api.{{ .Domain }}`)"
    traefik.http.routers.new-api.tls.certresolver: "traefik"
  networks:
    - "{{ .NetworkName }}"
  restart: always
  privileged: false
  resources:
    memory: "512M"

traefik:
  enabled: true
  entrypoint: websecure
  host: "new-api.{{ .Domain }}"
  tls: true
  cert_resolver: traefik

post_install:
  message: |
    New API installed successfully!
    URL: https://new-api.{{ .Domain }}
