api_version: "1.0"
name: cloudflared
description: "Cloudflare Tunnel client for secure tunneling"
category: network
tags: [cloudflare, tunnel, proxy, network]
dependencies: []

params:
  - name: "self.CLOUDFLARED_TUNNEL_ID"
    type: string
    label: "Cloudflared Tunnel Id"

container:
  name: cloudflared
  image: cloudflare/cloudflared:latest
  command:
    - "--loglevel"
    - "warn"
    - "--no-tls-verify"
    - "--edge-ip-version"
    - "auto"
    - "tunnel"
    - "run"
    - "--url"
    - "https://traefik:443"
    - "{{ index .Custom "self.CLOUDFLARED_TUNNEL_ID" }}"
  volumes:
    - "{{ .DataDir }}/cloudflared/etc:/etc/cloudflared"
  environment:
    TZ: "{{ index .Custom "common.TZ" | default \"Asia/Shanghai\" }}"
  networks:
    - "{{ .NetworkName }}"
  restart: always
  resources:
    memory: "64M"
