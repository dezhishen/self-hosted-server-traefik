api_version: "1.0"
name: moontv
description: "MoonTV IPTV streaming platform"
category: media
tags:
  - iptv
  - tv
  - streaming
dependencies:
  - traefik

params:
  - name: "self.MOONTV_PASSWORD"
    type: password
    label: "Moontv Password"
    secret: true
  - name: "app.REDIS_PASSWORD"
    type: password
    label: "Redis Password"
    secret: true
    default: ""
  - name: "self.MOONTV_REDIS_DBINDEX"
    type: number
    label: "Moontv Redis Dbindex"
    default: 0

container:
  name: moontv
  image: ghcr.io/senshinya/moontv:latest
  environment:
    TZ: "{{ index .Custom "common.TZ" | default \"Asia/Shanghai\" }}"
    LANG: "{{ index .Custom "common.LANG" | default \"zh_CN.UTF-8\" }}"
    USERNAME: "admin"
    PASSWORD: "{{ index .Custom "self.MOONTV_PASSWORD" }}"
    NEXT_PUBLIC_STORAGE_TYPE: "redis"
    NEXT_PUBLIC_ENABLE_REGISTER: "false"
    REDIS_URL: "redis://{{ index .Custom "app.REDIS_PASSWORD" | default \"\" }}@redis:6379/{{ index .Custom "self.MOONTV_REDIS_DBINDEX" | default \"0\" }}"
  labels:
    traefik.enable: "true"
    traefik.http.routers.moontv.rule: "Host(`moontv.{{ .Domain }}`)"
    traefik.http.routers.moontv.tls: "{{ .TLSEnabled }}"
    traefik.http.routers.moontv.tls.certresolver: "traefik"
    traefik.http.routers.moontv.tls.domains[0].main: "moontv.{{ .Domain }}"
    traefik.http.services.moontv.loadbalancer.server.port: "3000"
  networks:
    - "{{ .NetworkName }}"
  restart: unless-stopped
  privileged: false

  resources:
    memory: "128M"
    cpu_max: ""

traefik:
  enabled: true
  entrypoint: websecure
  host: "moontv.{{ .Domain }}"
  tls: true
  cert_resolver: traefik
  network_mode: bridge

post_install:
  message: |
    MoonTV installed successfully!
    URL: https://moontv.{{ .Domain }}
    Default username: admin
    Requires a Redis instance accessible at hostname 'redis'.
