api_version: "1.0"
name: vaultwarden
description: "Vaultwarden password manager (Bitwarden compatible)"
category: security
tags:
  - passwords
  - bitwarden
  - vault
dependencies:
  - traefik

params:
  - name: "self.SIGNUPS_ALLOWED"
    type: string
    label: "Signups Allowed"
    default: "true"
  - name: "self.VAULTWARDEN_DATABASE_WAL"
    type: bool
    label: "Vaultwarden Database Wal"
    default: False
  - name: "self.VAULTWARDEN_DATABASE_URL"
    type: string
    label: "Vaultwarden Database Url"

container:
  name: vaultwarden
  image: vaultwarden/server:latest
  volumes:
    - "{{ .DataDir }}/vaultwarden/data:/data/"
  environment:
    TZ: "{{ index .Custom "common.TZ" | default \"Asia/Shanghai\" }}"
    LANG: "{{ index .Custom "common.LANG" | default \"zh_CN.UTF-8\" }}"
    SIGNUPS_ALLOWED: "{{ index .Custom "self.SIGNUPS_ALLOWED" | default \"true\" }}"
    ENABLE_DB_WAL: "{{ index .Custom "self.VAULTWARDEN_DATABASE_WAL" | default \"false\" }}"
    DATABASE_URL: "{{ index .Custom "self.VAULTWARDEN_DATABASE_URL" }}"
  labels:
    traefik.docker.network: "{{ .NetworkName }}"
    traefik.enable: "true"
    traefik.http.routers.vaultwarden.rule: "Host(`vaultwarden.{{ .Domain }}`)"
    traefik.http.routers.vaultwarden.tls: "{{ .TLSEnabled }}"
    traefik.http.routers.vaultwarden.tls.certresolver: "traefik"
    traefik.http.routers.vaultwarden.tls.domains[0].main: "vaultwarden.{{ .Domain }}"
    traefik.http.services.vaultwarden.loadbalancer.server.port: "80"
  networks:
    - "{{ .NetworkName }}"
  restart: unless-stopped
  privileged: false
  user: "{{ index .Custom "common.PUID" | default \"1000\" }}:{{ index .Custom "common.PGID" | default \"1000\" }}"

  resources:
    memory: "256M"

traefik:
  enabled: true
  entrypoint: websecure
  host: "vaultwarden.{{ .Domain }}"
  tls: true
  cert_resolver: traefik
  network_mode: bridge

post_install:
  message: |
    Vaultwarden installed successfully!
    URL: https://vaultwarden.{{ .Domain }}
    Database types: sqlite3 (default), mysql. Set VAULTWARDEN_DATABASE_TYPE and related credentials via custom variables.
    For MySQL, set: VAULTWARDEN_DATABASE_URL=mysql://user:password@host:port/vaultwarden
